<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Store</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <header class="header">
            <nav class="navigation">

                <div class="navigation__brand">
                    <a href="#">
                        <img class="navigation__burger" src="ic/burger.svg" alt="Меню">
                    </a>

                    <img class="navigation__logo" src="ic/Group.png" alt="Логотип">
                </div>

                <ul class="navigation__menu">

                    <li class="navigation__list-item">
                        <a class="navigation__item" href="#">
                            <img src="ic/call.svg" alt="Позвонить">
                        </a>
                    </li>

                    <li class="navigation__list-item">
                        <a class="navigation__item" href="#">
                            <img src="ic/chat.svg" alt="Чат">
                        </a>
                    </li>

                    <li class="navigation__list-item">
                        <a class="navigation__item" href="#">
                            <img src="ic/profile.svg" alt="Профиль">
                        </a>
                    </li>

                    <li class="navigation__list-item">
                        <a class="navigation__item" href="#">
                            <img src="ic/repair.svg" alt="Ремонт">
                        </a>
                    </li>

                    <li class="navigation__list-item">
                        <a class="navigation__item" href="#">
                            <img src="ic/checkstatus.svg" alt="Статус">
                        </a>
                    </li>

                </ul>

            </nav>
        </header>

        <main class="main">

            <h1 class="services__title">Услуги и сервисы</h1>

            <nav class="services__nav">

                <button class="services__nav-item">Ремонтируемые устройства</button>

                <button class="services__nav-item">Дополнительные услуги</button>

                <button class="services__nav-item">Цены на услуги</button>

                <button class="services__nav-item">Специальные цены</button>

            </nav>

            <section class="services">

                <div class="services__content">

                    <p class="services__text">
                        Мы являемся авторизованным сервисным центром по ремонту техники Dell.
                        Только у нас вы можете отремонтировать свой ноутбук Dell с официальной гарантией производителя.
                    </p>

                    <p class="services__text">
                        Мы успешно работаем с 1992 года и заслужили репутацию надежного партнера.
                    </p>

                    <a class="services__more" href="#">
                        Читать далее
                    </a>

                </div>

                <img class="services__image" src="ic/seksek.svg" alt="Сервисный центр">

            </section>

        </main>

    </div>

</body>

</html>
